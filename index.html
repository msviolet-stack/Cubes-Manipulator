<!DOCTYPE html>
<html>
<head>
  <title>3D Cube Structure</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(10, 10, 10);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls (rotation + zoom)
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

// Materials
const smallMaterial = new THREE.MeshStandardMaterial({color: 0x66ccff});
const bigMaterial = new THREE.MeshStandardMaterial({color: 0xff9966});

// SMALL CUBES (6x6 grid, 2 layers)
const smallSize = 0.8;
const spacingSmall = 1;

for (let layer = 0; layer < 2; layer++) {
  for (let x = 0; x < 6; x++) {
    for (let z = 0; z < 6; z++) {
      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(smallSize, smallSize, smallSize),
        smallMaterial
      );

      cube.position.set(
        x * spacingSmall,
        layer * spacingSmall,
        z * spacingSmall
      );

      scene.add(cube);
    }
  }
}

// BIG CUBES (3x3 grid, 2 layers)
const bigSize = 1.8;
const spacingBig = 2;

for (let layer = 2; layer < 4; layer++) {
  for (let x = 0; x < 3; x++) {
    for (let z = 0; z < 3; z++) {
      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(bigSize, bigSize, bigSize),
        bigMaterial
      );

      cube.position.set(
        x * spacingBig + 1, // center alignment
        layer * spacingBig - 1,
        z * spacingBig + 1
      );

      scene.add(cube);
    }
  }
}

// Center the structure
scene.position.set(-3, -2, -3);

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize fix
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
