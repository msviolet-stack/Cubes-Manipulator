<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotatable Cube Structure</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #e9e9e9;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    #info {
      position: absolute;
      bottom: 14px;
      left: 14px;
      right: 14px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    #counter {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <button id="resetBtn">Reset cubes</button>
      <button id="edgesBtn">Hide edges</button>
    </div>

    <div id="info">
      Drag to rotate. Pinch or scroll to zoom. Tap a cube to remove it.<br>
      Visible cubes: <span id="counter">0</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const container = document.getElementById("app");
    const counterEl = document.getElementById("counter");
    const resetBtn = document.getElementById("resetBtn");
    const edgesBtn = document.getElementById("edgesBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe9e9e9);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(10, 10, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(3, 3, 3);
    controls.minDistance = 8;
    controls.maxDistance = 25;
    controls.update();

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(10, 16, 10);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dir2.position.set(-8, 6, -6);
    scene.add(dir2);

    // Group for all cubes
    const structureGroup = new THREE.Group();
    scene.add(structureGroup);

    const cubeItems = [];
    let showEdges = true;

    const smallMaterial = new THREE.MeshStandardMaterial({
      color: 0x76d7ea,
      roughness: 0.45,
      metalness: 0.05
    });

    const bigMaterial = new THREE.MeshStandardMaterial({
      color: 0xf0ab73,
      roughness: 0.45,
      metalness: 0.05
    });

    function addCube(sizeX, sizeY, sizeZ, x, y, z, material) {
      const geometry = new THREE.BoxGeometry(sizeX, sizeY, sizeZ);
      const mesh = new THREE.Mesh(geometry, material);

      mesh.position.set(x, y, z);

      const edgeGeometry = new THREE.EdgesGeometry(geometry);
      const edgeLines = new THREE.LineSegments(
        edgeGeometry,
        new THREE.LineBasicMaterial({ color: 0x333333 })
      );
      edgeLines.visible = showEdges;
      mesh.add(edgeLines);

      mesh.userData.edgeLines = edgeLines;
      mesh.userData.removed = false;

      structureGroup.add(mesh);
      cubeItems.push(mesh);
    }

    function buildStructure() {
      // Clear old
      while (structureGroup.children.length > 0) {
        const obj = structureGroup.children[0];
        structureGroup.remove(obj);
      }
      cubeItems.length = 0;

      // Bottom 2 layers: 6 x 6 small cubes, each 1x1x1
      // Centers at x/z: 0.5 to 5.5, y: 0.5 and 1.5
      for (let layer = 0; layer < 2; layer++) {
        for (let row = 0; row < 6; row++) {
          for (let col = 0; col < 6; col++) {
            addCube(
              1, 1, 1,
              col + 0.5,
              layer + 0.5,
              row + 0.5,
              smallMaterial
            );
          }
        }
      }

      // Top 2 layers: 3 x 3 big cubes, each 2x2x2
      // To make whole solid a 6x6x6 cube:
      // x/z centers at 1,3,5 and y centers at 3 and 5
      for (let layer = 0; layer < 2; layer++) {
        for (let row = 0; row < 3; row++) {
          for (let col = 0; col < 3; col++) {
            addCube(
              2, 2, 2,
              col * 2 + 1,
              layer * 2 + 3,
              row * 2 + 1,
              bigMaterial
            );
          }
        }
      }

      updateCounter();
    }

    buildStructure();

    // Ground helper for visual reference
    const grid = new THREE.GridHelper(16, 16, 0x888888, 0xbbbbbb);
    grid.position.set(3, 0, 3);
    scene.add(grid);

    // Raycasting for remove-on-tap
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let downX = 0;
    let downY = 0;
    let moved = false;

    renderer.domElement.addEventListener("pointerdown", (event) => {
      downX = event.clientX;
      downY = event.clientY;
      moved = false;
    });

    renderer.domElement.addEventListener("pointermove", (event) => {
      const dx = event.clientX - downX;
      const dy = event.clientY - downY;
      if (Math.hypot(dx, dy) > 8) moved = true;
    });

    renderer.domElement.addEventListener("pointerup", (event) => {
      if (moved) return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(cubeItems, false);

      if (intersects.length > 0) {
        const clicked = intersects[0].object;
        if (clicked.visible) {
          clicked.visible = false;
          clicked.userData.removed = true;
          updateCounter();
        }
      }
    });

    function updateCounter() {
      const visibleCount = cubeItems.filter(c => c.visible).length;
      counterEl.textContent = `${visibleCount} / ${cubeItems.length}`;
    }

    resetBtn.addEventListener("click", () => {
      cubeItems.forEach(cube => {
        cube.visible = true;
        cube.userData.removed = false;
      });
      updateCounter();
    });

    edgesBtn.addEventListener("click", () => {
      showEdges = !showEdges;
      cubeItems.forEach(cube => {
        cube.userData.edgeLines.visible = showEdges;
      });
      edgesBtn.textContent = showEdges ? "Hide edges" : "Show edges";
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
